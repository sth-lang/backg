<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<style>
  :root{
    --bg1:#7ec0e8; --bg2:#9ad0ee; --bg3:#b8e0f4; --bg4:#d6eefb; --bg5:#eaf7ff;
    --card:#ecf5fd; --card2:#f7fbff; --line:#bcd8ee; --line-dk:#8fbcdf;
    --ink:#3a4658; --ink-dim:#8f9bb0; --head:#c2ddf2; --head-ink:#33506e;
    --gold:#7cc0ec; --gold-dk:#4f9bcf; --btn-ink:#123a55; --sel:#f2a15c;
    --st0:#7cc97c; --st0bg:#e9f6ea;  /* 출석 */
    --st1:#f0807c;                    /* 결석 */
    --st2:#f4c84a;                    /* 지각 */
    --st3:#5fb0e6;                    /* 조퇴 */
    --st4:#b292dd;                    /* 결과 */
    --heart:#f0686e; --heart-mt:#e7c9cb;
    --r:18px; --r-sm:11px; --r-xs:7px;
    --px:"Press Start 2P",monospace;
    --ko:"Galmuri11","Galmuri14",monospace; --ko-lg:"Galmuri14","Galmuri11",monospace;
    --sh:0 0 0 3px #fff,8px 9px 0 0 rgba(70,110,150,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  img,svg{image-rendering:pixelated;image-rendering:crisp-edges}
  body{font-family:var(--ko);color:var(--ink);height:100vh;width:100vw;overflow:hidden;line-height:1.5;
    background:linear-gradient(to bottom,var(--bg1) 0 16%,var(--bg2) 16% 36%,var(--bg3) 36% 58%,var(--bg4) 58% 80%,var(--bg5) 80% 100%);
    transition:background 2.5s steps(6);position:relative}

  .clouds{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .clouds svg{position:absolute;opacity:.95}
  .c1{top:6%;left:-160px;animation:float1 95s linear infinite}
  .c2{top:18%;left:-220px;animation:float2 135s linear infinite}
  .c3{top:3%;left:-120px;animation:float1 115s linear infinite;animation-delay:-50s}
  @keyframes float1{to{transform:translateX(calc(100vw + 260px))}}
  @keyframes float2{to{transform:translateX(calc(100vw + 320px))}}

  .ground{position:fixed;left:0;right:0;bottom:0;height:104px;width:100%;z-index:0;pointer-events:none;display:block}
  .critters{position:fixed;left:0;right:0;top:0;bottom:0;height:100vh;z-index:0;pointer-events:none;overflow:hidden}
  .critter{position:absolute;bottom:60px;will-change:transform}
  .critter svg{display:block;animation:bob 1s ease-in-out infinite}
  .walkA{animation:walk 62s linear infinite;bottom:60px}
  .walkB{animation:walk 78s linear infinite;animation-delay:-24s;bottom:66px}
  .walkC{animation:walk 54s linear infinite;animation-delay:-32s;bottom:58px}
  .walkD{animation:walk 70s linear infinite;animation-delay:-14s;bottom:62px}
  .walkE{animation:walkR 66s linear infinite;animation-delay:-40s;bottom:58px}
  .walkF{animation:walk 48s linear infinite;animation-delay:-8s;bottom:56px}
  .walkG{animation:walkR 90s linear infinite;animation-delay:-55s;bottom:64px}
  .bird{will-change:transform}
  .bird svg{animation:flap 1.5s ease-in-out infinite !important}
  .flyA{animation:fly 34s linear infinite;animation-delay:-12s}
  .flyB{animation:flyR 42s linear infinite;animation-delay:-28s}
  .walkH{animation:walk 76s linear infinite;animation-delay:-46s;bottom:60px}
  .walkJ{animation:walk 50s linear infinite;animation-delay:-20s;bottom:62px}
  .flyC{animation:fly 50s linear infinite;animation-delay:-16s}
  .flyD{animation:fly 40s linear infinite;animation-delay:-30s}
  .flyE{animation:flyR 56s linear infinite;animation-delay:-25s}
  .flyF{animation:fly 44s linear infinite;animation-delay:-33s}
  .flyG{animation:flyR 30s linear infinite;animation-delay:-10s}
  .bee svg{animation:flutter .16s linear infinite !important}
  .plane svg{animation:none !important}
  .flyRplane{}
  .walkK{animation:walk 58s linear infinite;animation-delay:-30s;bottom:52px}
  @keyframes flutter{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.35)}}
  @keyframes bob{50%{transform:translateY(-4px)}}
  @keyframes walk{from{transform:translateX(-140px)}to{transform:translateX(calc(100vw + 140px))}}
  @keyframes walkR{from{transform:translateX(calc(100vw + 140px)) scaleX(-1)}to{transform:translateX(-140px) scaleX(-1)}}
  @keyframes fly{from{transform:translateX(-160px) translateY(0)}25%{transform:translateX(25vw) translateY(-14px)}50%{transform:translateX(50vw) translateY(4px)}75%{transform:translateX(75vw) translateY(-10px)}to{transform:translateX(calc(100vw + 160px)) translateY(0)}}
  @keyframes flyR{from{transform:translateX(calc(100vw + 160px)) translateY(6px) scaleX(-1)}50%{transform:translateX(50vw) translateY(-12px) scaleX(-1)}to{transform:translateX(-160px) translateY(0) scaleX(-1)}}
  @keyframes flap{50%{transform:translateY(-3px)}}
  @keyframes fallS{0%{transform:translate(0,-10vh) rotate(0)}100%{transform:translate(var(--drift),110vh) rotate(360deg)}}
  @keyframes fallF{0%{transform:translate(0,-10vh) rotate(0)}50%{transform:translate(calc(var(--drift)*0.5),50vh) rotate(180deg)}100%{transform:translate(var(--drift),110vh) rotate(720deg)}}

  .wrap{position:relative;z-index:1;max-width:1400px;margin:0;margin-right:auto;margin-left:clamp(10px,calc(4.5vw + 20px),106px);padding:clamp(6px,1vh,12px) clamp(14px,2.5vw,26px) 78px;padding-top:calc(clamp(6px,1vh,12px) + 92px);display:flex;flex-direction:column;gap:clamp(8px,1.2vh,12px);height:100vh;overflow:hidden}

  .hero{position:fixed;top:6px;left:0;right:0;z-index:1;pointer-events:none;text-align:center;padding-top:0}
  .greeting{font-family:var(--ko);font-size:clamp(12px,1.5vw,14px);color:#3a4660;text-shadow:2px 2px 0 #fff}
  .clock{font-family:var(--px);font-size:clamp(18px,3.2vw,32px);line-height:1.05;margin:2px 0 2px;color:#33405e;
    text-shadow:-2px 0 #fff,2px 0 #fff,0 -2px #fff,0 2px #fff,2px 2px #fff,-2px -2px #fff,2px -2px #fff,-2px 2px #fff,5px 6px 0 rgba(60,80,120,.22)}
  .clock .ampm{font-family:var(--ko);font-size:.34em;color:#e07a3a;margin-right:.3em;vertical-align:.18em;text-shadow:2px 2px 0 #fff}
  .clock .sec{font-size:.42em;color:#5fb0e6;vertical-align:.42em;margin-left:.12em}
  .date{font-family:var(--ko);font-size:clamp(11px,1.3vw,13px);color:#41506e;text-shadow:2px 2px 0 #fff}

  .row{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(10px,1.3vw,16px);flex:1 1 0;min-height:0;overflow:hidden}
  .col{display:flex;flex-direction:column;gap:clamp(10px,1.3vw,16px);min-height:0}
  .col>section{min-height:0}
  .colL>section:nth-child(1){flex:1.9 1 0}  /* 일정 크게 */
  .colL>section:nth-child(2){flex:1 1 0}    /* 할일 작게 */
  .colR>section:nth-child(1){flex:1.05 1 0} /* 출결 */
  .colR>section:nth-child(2){flex:1 1 0}    /* 시간표: 원래 크기 */
  .win{background:rgba(247,251,255,0.62);border:4px solid rgba(188,216,238,0.85);border-radius:var(--r);box-shadow:var(--sh);padding:11px 12px;display:flex;flex-direction:column;position:relative;min-height:0;overflow:hidden;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  .win-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;border-bottom:3px dashed var(--line);padding-bottom:6px;flex:0 0 auto}
  .win-title{font-family:var(--ko-lg);font-size:15px;color:var(--head-ink);letter-spacing:.04em;display:flex;align-items:center;gap:8px}
  .win-title .star{color:var(--gold-dk);font-size:13px}
  .win-sub{font-family:var(--ko);font-size:12px;color:var(--ink-dim)}

  .pbtn{font-family:var(--ko);font-size:13px;color:var(--btn-ink);background:var(--gold);border:none;padding:10px 13px;cursor:pointer;border-radius:var(--r-sm);box-shadow:0 4px 0 0 var(--gold-dk),0 0 0 2px rgba(20,60,90,.25);transition:transform .05s,box-shadow .05s}
  .pbtn:hover{transform:translateY(-1px)} .pbtn:active{transform:translateY(4px);box-shadow:0 0 0 0 var(--gold-dk),0 0 0 2px rgba(20,60,90,.25)}
  .pbtn.ghost{background:#dfeaf5;color:var(--ink);box-shadow:0 4px 0 0 #a9c4dd,0 0 0 2px rgba(70,110,150,.25)}
  .pbtn.ghost:active{box-shadow:0 0 0 0 #a9c4dd,0 0 0 2px rgba(70,110,150,.25)}
  .mini{width:32px;height:30px;display:grid;place-items:center;font-size:17px;padding:0}
  input[type=text],input[type=number]{font-family:var(--ko);font-size:13px;color:var(--ink);background:rgba(246,251,255,.85);border:none;box-shadow:inset 0 0 0 2px var(--line);padding:8px 11px;border-radius:var(--r-sm);min-width:0}
  input::placeholder{color:var(--ink-dim)}
  input:focus,.pbtn:focus-visible,.cell:focus-visible{outline:3px solid var(--st3);outline-offset:2px}
  input:focus{outline-offset:0}
  .row-input{display:flex;gap:7px}

  /* 캘린더 */
  .cal-nav{display:flex;align-items:center;gap:6px}
  .cal-month{font-family:var(--ko);font-size:12px;min-width:84px;text-align:center;color:var(--ink)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:2px;flex:1 1 auto;min-height:0}
  .cal-grid .dow{font-family:var(--ko);font-size:14px;font-weight:700;text-align:center;padding:4px 0 6px;color:var(--head-ink);letter-spacing:.02em}
  .cal-grid .dow.sun{color:#e05a5a} .cal-grid .dow.sat{color:#4a7fd6}
  .cell{min-height:0;border:none;background:transparent;color:var(--ink);cursor:pointer;font-family:var(--ko);position:relative;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;gap:1px;padding:2px 3px 1px;border-radius:var(--r-xs);transition:background .05s;overflow:hidden}
  .cell .dn{text-align:center;line-height:1;font-size:14px;font-weight:700;flex:0 0 auto}
  .cell.sun .dn{color:#e05a5a} .cell.sat .dn{color:#4a7fd6}
  .cell:hover{background:#d9e8f6}
  .cell.muted{opacity:.4}
  .cell.today{background:var(--gold);box-shadow:0 0 0 2px var(--gold-dk)}
  .cell.today .dn{color:#5a4110}
  .cell.today.sun .dn,.cell.today.sat .dn{color:#5a4110}
  .cell.selected{box-shadow:inset 0 0 0 3px var(--sel)}
  .cell.today.selected{box-shadow:0 0 0 2px var(--gold-dk),inset 0 0 0 3px var(--sel)}
  .cell .evmore{position:absolute;top:2px;right:3px;font-family:var(--ko);font-size:10px;line-height:1;padding:2px 4px;border-radius:6px;background:var(--head);color:var(--head-ink);font-weight:700}
  .cell .evbar{width:100%;font-family:var(--ko);font-size:10.5px;line-height:1.2;padding:1px 3px;border-radius:2px;background:linear-gradient(transparent 40%,#fff176 40%,#ffe066 100%);color:#3a2a10;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;box-sizing:border-box;flex:0 0 auto}
  .cell.muted .evbar{opacity:.5}
  .cell.att::before{content:"";position:absolute;top:3px;right:4px;width:5px;height:5px;background:var(--st1);border-radius:50%}
  .cell.today.att::before{background:#5a4110}
  .day-panel{margin-top:6px;padding-top:6px;border-top:3px dashed var(--line);flex:0 0 auto;display:flex;flex-direction:column;min-height:0;max-height:38%}
  .day-label{font-family:var(--ko);font-size:12px;color:var(--gold-dk)}
  .day-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;flex:0 0 auto}
  .ev-add{display:none;gap:7px;margin-bottom:9px}
  .ev-add.show{display:flex}
  .ev-list{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:minmax(28px,1fr);gap:5px;flex:1 1 auto;min-height:0;overflow:hidden;align-content:start;;max-height:62px}
  .ev{display:flex;align-items:center;gap:4px;font-size:12px;background:#f3f9fe;padding:5px 7px;border-radius:var(--r-xs);box-shadow:inset 0 0 0 2px var(--line);min-width:0;overflow:hidden}
  .ev span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;line-height:1.3}
  .ev button{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:11px;opacity:0;transition:.1s;flex:0 0 auto;padding:0 2px}
  .ev:hover button{opacity:1} .ev button:hover{color:var(--st1)}
  .ev.more{background:var(--head);color:var(--head-ink);justify-content:center;font-weight:700;box-shadow:none}
  .ev-empty{font-family:var(--ko);font-size:12px;color:var(--ink-dim);padding:4px 0 6px}

  /* 할일 + 체력 */
  .hp-wrap{display:flex;align-items:center;gap:9px;margin-bottom:8px;background:#f3f9fe;padding:7px 10px;border-radius:var(--r-sm);box-shadow:inset 0 0 0 2px var(--line);flex:0 0 auto}
  .hp-hearts{display:flex;gap:4px}
  .hp-msg{font-family:var(--ko);font-size:11px;color:var(--ink-dim)}
  .todo-list{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;align-content:start;flex:1 1 auto;overflow-y:auto;margin-bottom:8px;min-height:0}
  .todo{display:flex;align-items:center;gap:9px;font-size:13px;padding:2px}
  .check{width:22px;height:22px;flex-shrink:0;background:#f6fbff;border:none;cursor:pointer;box-shadow:inset 0 0 0 3px var(--line-dk);display:grid;place-items:center;border-radius:var(--r-xs);transition:.1s}
  .check:hover{box-shadow:inset 0 0 0 3px var(--st0)}
  .todo.done .check{background:var(--st0);box-shadow:inset 0 0 0 3px #4f9a3f}
  .check svg{opacity:0} .todo.done .check svg{opacity:1}
  .todo .txt{flex:1;word-break:break-all}
  .todo.done .txt{color:var(--ink-dim);text-decoration:line-through}
  .todo .del{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:13px;opacity:0;flex-shrink:0;transition:.1s}
  .todo:hover .del{opacity:1} .todo .del:hover{color:var(--st1)}
  .todo-empty{grid-column:1/-1;text-align:center;color:var(--ink-dim);font-size:12px;padding:18px 0}

  /* 출결 */
  .attend-cnt{font-family:var(--ko);font-size:11px;color:var(--ink-dim);display:flex;align-items:center;gap:5px}
  .attend-cnt input{width:42px;text-align:center;padding:5px 4px;-moz-appearance:textfield}
  .attend-cnt input::-webkit-outer-spin-button,.attend-cnt input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .attend-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;flex:0 0 auto}
  .attend-bar .win-sub{color:var(--gold-dk);font-size:12px}
  .legend{display:flex;gap:4px}
  .legend i{font-style:normal;font-family:var(--ko);font-size:10px;width:19px;height:19px;display:grid;place-items:center;border-radius:5px;color:#3a2a10}
  .legend .l1{background:var(--st1);color:#fff}.legend .l2{background:var(--st2)}.legend .l3{background:var(--st3)}.legend .l4{background:var(--st4);color:#fff}
  .attend-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:5px;margin-bottom:2px;flex:1 1 auto;min-height:0}
  .att-col{display:flex;flex-direction:column;gap:3px;min-width:0;min-height:0}
  .ah-p{font-family:var(--ko);font-size:12px;color:var(--head-ink);text-align:center;padding:4px 0;background:#dcebf7;border-radius:6px;font-weight:700;line-height:1;box-sizing:border-box}
  .att-cell{width:100%;flex:1 1 auto;min-height:0;border:none;cursor:pointer;font-family:var(--ko);border-radius:8px;background:#e9f6ea;box-shadow:inset 0 0 0 2px #e2ead9;color:#4a4656;transition:transform .05s;position:relative;box-sizing:border-box;padding:4px 5px;display:flex;flex-direction:column;align-items:stretch;justify-content:center;gap:2px;overflow:hidden;font-size:11px}
  .att-cell:hover{box-shadow:inset 0 0 0 2px var(--st0)}
  .att-cell:active{transform:scale(.95)}
  .att-cell.s0{background:#e9f6ea}
  .att-cell.s0 .dot{font-size:22px;color:#a8b1a0;line-height:1;text-align:center}
  .att-cell .row-line{font-family:var(--ko);font-size:11px;line-height:1.3;text-align:left;overflow:hidden;padding:2px 4px;border-radius:3px;font-weight:700;word-break:break-word;white-space:normal;display:flex;flex-wrap:wrap;align-items:baseline;gap:2px}
  .att-cell .row-line .k{margin-right:4px;font-weight:800}
  .att-cell .row-line.s1{background:#f7cfcd;color:#a4302c}
  .att-cell .row-line.s2{background:#f6e3ab;color:#8b6a12}
  .att-cell .row-line.s3{background:#cbe6f7;color:#1e5f8f}
  .att-cell .row-line.s4{background:#e2d2f2;color:#5a3a8a}
  .att-cell.only-s1{background:#fbe4e3;box-shadow:inset 0 0 0 2px #eeb0ad}
  .att-cell.only-s2{background:#fbf1d4;box-shadow:inset 0 0 0 2px #e6c469}
  .att-cell.only-s3{background:#dcf0fb;box-shadow:inset 0 0 0 2px #a4cef0}
  .att-cell.only-s4{background:#efe6fa;box-shadow:inset 0 0 0 2px #cbb4e8}
  .att-cell.multi{background:#eef0f2;box-shadow:inset 0 0 0 2px #d4d8de}
  .attend-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;padding-top:6px;border-top:3px dashed var(--line);flex:0 0 auto}
  .attend-foot .pbtn{padding:8px 11px;font-size:12px}
  .att-log{display:none}
  .att-log .li{font-family:var(--ko);font-size:11.5px;color:var(--ink);background:#f6fbff;border-radius:6px;padding:5px 8px;box-shadow:inset 0 0 0 2px var(--line);display:flex;gap:6px;align-items:center}
  .att-log .tag{font-size:10px;padding:1px 5px;border-radius:4px;color:#3a2a10}
  .att-log .tag.s1{background:var(--st1);color:#fff}.att-log .tag.s2{background:var(--st2)}.att-log .tag.s3{background:var(--st3);color:#fff}.att-log .tag.s4{background:var(--st4);color:#fff}

  /* 시간표 */
  .tt{width:100%}
  .tt-grid{display:grid;grid-template-columns:30px repeat(5,1fr);grid-auto-rows:1fr;gap:2px;flex:1 1 auto;min-height:0}
  .tt-grid .h{font-family:var(--ko);font-size:11px;text-align:center;padding:4px 0;background:rgba(194,221,242,.85);color:var(--head-ink);border-radius:var(--r-xs);font-weight:700}
  .tt-grid .p{font-family:var(--ko);font-size:10px;text-align:center;padding:2px 0;background:rgba(220,235,247,.82);color:var(--head-ink);border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center}
  .tt-cell{font-family:var(--ko);font-size:12px;text-align:center;padding:3px 1px;background:rgba(246,251,255,.72);color:var(--ink);border-radius:var(--r-xs);box-shadow:inset 0 0 0 2px var(--line);cursor:text;min-height:0;outline:none;display:flex;align-items:center;justify-content:center}
  .tt-cell:focus{box-shadow:inset 0 0 0 2px var(--st3);background:#fff}
  .tt-cell:empty::before{content:"+";color:var(--line-dk)}
  .tt-hint{font-family:var(--ko);font-size:11px;color:var(--ink-dim);margin-top:5px}
  .tt-tabs{display:flex;gap:4px}
  .tt-tabs button{font-family:var(--ko);font-size:11px;color:var(--head-ink);background:#dcebf7;border:none;padding:6px 12px;cursor:pointer;border-radius:8px;box-shadow:inset 0 0 0 2px transparent;transition:.1s}
  .tt-tabs button.active{background:var(--gold);color:var(--btn-ink);box-shadow:0 0 0 2px var(--gold-dk)}

  /* 모달 */
  .modal-bg{position:fixed;inset:0;z-index:50;background:rgba(40,50,70,.45);display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);border:4px solid var(--line);border-radius:var(--r);box-shadow:0 0 0 3px #fff,0 18px 50px rgba(40,50,70,.4);padding:20px;width:300px;max-width:100%}
  .modal-title{font-family:var(--ko-lg);font-size:15px;color:var(--head-ink);margin-bottom:14px}
  .status-pick{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:13px}
  .sp{font-family:var(--ko);font-size:11px;padding:10px 0;border:none;cursor:pointer;border-radius:var(--r-xs);color:#3a2a10;box-shadow:0 0 0 2px transparent;transition:.08s}
  .sp.b0{background:var(--st0bg);color:#3f7a3f}.sp.b1{background:var(--st1);color:#fff}.sp.b2{background:var(--st2)}.sp.b3{background:var(--st3);color:#fff}.sp.b4{background:var(--st4);color:#fff}
  .sp.sel{box-shadow:0 0 0 3px #33405e;transform:translateY(-2px)}

<script>
const $=id=>document.getElementById(id);
const NS="http://www.w3.org/2000/svg";
function rect(svg,x,y,w,h,fill){const r=document.createElementNS(NS,"rect");r.setAttribute("x",x);r.setAttribute("y",y);r.setAttribute("width",w);r.setAttribute("height",h);r.setAttribute("fill",fill);svg.appendChild(r);}

/* 구름 */
function drawCloud(svg,light,shade){
  const body=[[3,0],[4,0],[5,0],[6,0],[7,0],[8,0],
    [1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[7,1],[8,1],[9,1],[10,1],
    [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[7,2],[8,2],[9,2],[10,2],[11,2],
    [1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],[8,3],[9,3],[10,3]];
  body.forEach(([x,y])=>rect(svg,x,y,1,1,light));
  [[2,4],[3,4],[4,4],[5,4],[6,4],[7,4],[8,4],[9,4]].forEach(([x,y])=>rect(svg,x,y,1,1,shade));
}
drawCloud(document.querySelector(".c1"),"#ffffff","#d3e2ef");
drawCloud(document.querySelector(".c2"),"#ffffff","#d3e2ef");
drawCloud(document.querySelector(".c3"),"#fbffff","#cfdeef");

/* 계절 팔레트 */
const MONTH=new Date().getMonth();
let SEASON="summer";
if(MONTH>=2&&MONTH<=4)SEASON="spring";
else if(MONTH>=5&&MONTH<=7)SEASON="summer";
else if(MONTH>=8&&MONTH<=10)SEASON="autumn";
else SEASON="winter";
const SEASONS={
  spring:{grass:"#8fd968",grassDk:"#5cb540",grassHi:"#b8ea90",dirt:"#caa06a",dirtDk:"#a87f4c",flower1:"#f6a8c0",flower2:"#ffffff",center:"#f6d24a",particle:"#ffc4d8",particleAlt:"#ffe0eb"},
  summer:{grass:"#6fce4f",grassDk:"#3f9930",grassHi:"#96e572",dirt:"#caa06a",dirtDk:"#a87f4c",flower1:"#f57a7a",flower2:"#f6d24a",center:"#ffffff",particle:"#ffff88",particleAlt:"#fff5aa"},
  autumn:{grass:"#c9a856",grassDk:"#8f7a2e",grassHi:"#e0c274",dirt:"#a87f4c",dirtDk:"#7a5432",flower1:"#e07040",flower2:"#c8524a",center:"#f6d24a",particle:"#e88e42",particleAlt:"#c8524a"},
  winter:{grass:"#e6eef5",grassDk:"#a8bdd0",grassHi:"#ffffff",dirt:"#c8bfa8",dirtDk:"#948872",flower1:"#a8c8e0",flower2:"#ffffff",center:"#ffe0a0",particle:"#ffffff",particleAlt:"#e6f2ff"}
};
const SEA=SEASONS[SEASON];

/* 잔디 + 꽃 */
(function(){
  const g=document.querySelector(".ground");const W=innerWidth,H=104,U=8,COLS=6;
  g.setAttribute("viewBox",`0 0 ${W} ${H}`);g.setAttribute("width","100%");g.setAttribute("height",H);
  const defs=document.createElementNS(NS,"defs");const pat=document.createElementNS(NS,"pattern");
  pat.setAttribute("id","grd");pat.setAttribute("width",U*COLS);pat.setAttribute("height",H);pat.setAttribute("patternUnits","userSpaceOnUse");
  const tops=[5,4,3,3,4,5],GB=6,DT=7;
  if(SEASON==="summer"){
    // 여름 = 해변: 얕은 바다 물결 + 모래 + 조개/불가사리
    const sandHi="#f6e6ba",sand2="#ead18f",sandDk="#d8bd80",water="#5fc4ee",foam="#d7f2fc";
    for(let cx=0;cx<COLS;cx++)rect(pat,cx*U,2*U,U,U,(cx%2===0)?foam:water);   // 파도
    for(let cx=0;cx<COLS;cx++)rect(pat,cx*U,3*U,U,U,sandHi);                  // 젖은 모래(해안선)
    for(let cy=4;cy<=GB;cy++)for(let cx=0;cx<COLS;cx++)rect(pat,cx*U,cy*U,U,U,sand2);
    for(let cy=DT;cy<H/U;cy++)for(let cx=0;cx<COLS;cx++)rect(pat,cx*U,cy*U,U,U,sandDk);
    [[1,9],[4,10],[2,12],[5,11]].forEach(([cx,cy])=>rect(pat,cx*U,cy*U,U,U,"#c9a86a"));
    rect(pat,1*U,4*U,U,U,"#f6a8c0");rect(pat,1*U,5*U,U,U,"#f4c0d4");          // 조개
    rect(pat,4*U,4*U,U,U,"#f0902a");                                          // 불가사리
  } else {
    const C={grass:SEA.grass,grassDk:SEA.grassDk,grassHi:SEA.grassHi,dirt:SEA.dirt,dirtDk:SEA.dirtDk};
    for(let cx=0;cx<COLS;cx++){const s=tops[cx];rect(pat,cx*U,s*U,U,U,C.grassHi);for(let cy=s+1;cy<=GB;cy++)rect(pat,cx*U,cy*U,U,U,C.grass);}
    rect(pat,0,GB*U,COLS*U,U,C.grassDk);
    for(let cy=DT;cy<H/U;cy++)for(let cx=0;cx<COLS;cx++)rect(pat,cx*U,cy*U,U,U,C.dirt);
    [[1,8],[4,9],[2,11],[5,10]].forEach(([cx,cy])=>rect(pat,cx*U,cy*U,U,U,C.dirtDk));

/* 계절 파티클 (벚꽃/눈/낙엽) */
(function(){
  // 계절별 파티클: 봄=벚꽃, 여름=꽃가루, 가을=낙엽, 겨울=눈 (연중 계절감)
  const layer=document.createElement("div");
  layer.style.cssText="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden";
  document.body.appendChild(layer);
  let N,round,fall,sizeLo,sizeHi,opLo,opHi,durLo,durHi;
  if(SEASON==="winter"){N=28;round=true;fall="S";sizeLo=2;sizeHi=5;opLo=.55;opHi=.95;durLo=8;durHi=18;}
  else if(SEASON==="summer"){N=15;round=true;fall="S";sizeLo=3;sizeHi=6;opLo=.3;opHi=.55;durLo=14;durHi=26;}   // 꽃가루/솜털 살랑살랑
  else if(SEASON==="autumn"){N=20;round=false;fall="F";sizeLo=7;sizeHi=13;opLo=.6;opHi=.9;durLo=9;durHi=18;}    // 낙엽
  else {N=18;round=false;fall="F";sizeLo=6;sizeHi=11;opLo=.55;opHi=.85;durLo=9;durHi=18;}                        // 벚꽃
  for(let i=0;i<N;i++){
    const p=document.createElement("div");
    const size=sizeLo+Math.random()*(sizeHi-sizeLo);
    const color=Math.random()<0.6?SEA.particle:SEA.particleAlt;
    const dur=durLo+Math.random()*(durHi-durLo);
    const delay=-Math.random()*dur;
    const left=Math.random()*100;
    const drift=(Math.random()*40-20);
    p.style.cssText=`position:absolute;left:${left}vw;top:-${size*2}px;width:${size}px;height:${size}px;background:${color};border-radius:${round?"50%":"2px"};opacity:${opLo+Math.random()*(opHi-opLo)};animation:fall${fall} ${dur}s linear infinite;animation-delay:${delay}s;--drift:${drift}vw`;
    layer.appendChild(p);
  }
})();

function renderCal(){
  $("calMonth").textContent=`${viewY}.${String(viewM+1).padStart(2,"0")}`;
  const grid=$("calGrid");grid.innerHTML="";
  ["일","월","화","수","목","금","토"].forEach((d,i)=>{const e=document.createElement("div");e.className="dow"+(i===0?" sun":i===6?" sat":"");e.textContent=d;grid.appendChild(e);});
  const first=new Date(viewY,viewM,1).getDay(),days=new Date(viewY,viewM+1,0).getDate(),prevDays=new Date(viewY,viewM,0).getDate();
  const todayStr=ymd(new Date());
  for(let i=0;i<first;i++){const dw=i%7;grid.appendChild(cell(prevDays-first+1+i,true,null,dw));}
  for(let day=1;day<=days;day++){
    const key=`${viewY}-${String(viewM+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dw=(first+day-1)%7;
    const c=cell(day,false,key,dw);
    if(key===todayStr)c.classList.add("today");
    if(key===selected)c.classList.add("selected");
    if(events[key]&&events[key].length)c.classList.add("has");
    if(attendance[key]&&Object.keys(attendance[key]).length)c.classList.add("att");
    grid.appendChild(c);

  const total=first+days,trail=(7-total%7)%7;for(let i=1;i<=trail;i++){const dw=(total+i-1)%7;grid.appendChild(cell(i,true,null,dw));}
  renderDay();
}

  if(obj.s===0)delete attendance[date][k];else attendance[date][k]=obj;
  if(Object.keys(attendance[date]).length===0)delete attendance[date];store.set("attendance",attendance);}

function computeEffectiveOne(s){
  const d=attendance[selected]||{};
  const marks=[];
  for(let p=0;p<PERIODS;p++){const k=s+"_"+p;if(d[k]&&d[k].s)marks.push({p,st:d[k].s,r:d[k].r||"",c:(d[k].c!=null?d[k].c:0)});}
  const eff=new Array(PERIODS).fill(null);
  const order=[4,3,2,1];
  order.forEach(target=>{
    marks.filter(m=>m.st===target).forEach(m=>{
      let auxRange=[];
      if(m.st===1) auxRange=Array.from({length:PERIODS},(_,i)=>i);
      else if(m.st===2) auxRange=Array.from({length:m.p},(_,i)=>i);
      else if(m.st===3) auxRange=Array.from({length:PERIODS-m.p-1},(_,i)=>m.p+1+i);
      auxRange.forEach(i=>{eff[i]={st:m.st,r:m.r,c:m.c,primary:false,no:s};});
      eff[m.p]={st:m.st,r:m.r,c:m.c,primary:true,no:s};
    });
  });
  return eff;
}
function computeClassByPeriod(){
  const d=attendance[selected]||{};
  const students=new Set();
  Object.keys(d).forEach(k=>students.add(parseInt(k.split("_")[0],10)));
  const byP=Array.from({length:PERIODS},()=>({1:[],2:[],3:[],4:[]}));
  students.forEach(s=>{
    const eff=computeEffectiveOne(s);
    for(let p=0;p<PERIODS;p++){
      const e=eff[p];
      if(e && e.st>=1 && e.st<=4){
        byP[p][e.st].push({no:s,r:e.r,primary:e.primary});
      }
    }
  });
  // 정렬
  for(let p=0;p<PERIODS;p++){for(const st of [1,2,3,4]){byP[p][st].sort((a,b)=>a.no-b.no);}}
  return byP;
}

      c.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();c.blur();}});
      g.appendChild(c);
    }
  }
}
$("ttTabs").addEventListener("click",e=>{const b=e.target.closest("button[data-v]");if(!b)return;
  if(document.activeElement&&document.activeElement.blur)document.activeElement.blur(); // 전환 전에 현재 표 저장
  ttView=Number(b.dataset.v);[...$("ttTabs").children].forEach(x=>x.classList.toggle("active",x===b));renderTT();});

/* 유튜브 */
function parseYT(u){if(!u)return null;u=u.trim();if(/^[\w-]{11}$/.test(u))return u;const m=u.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/))([\w-]{11})/);return m?m[1]:null;}
function showThumb(id){const f=$("ytFrame");f.classList.remove("empty");
  f.innerHTML=`<div class="yt-thumb" style="background-image:url('https://i.ytimg.com/vi/${id}/hqdefault.jpg')"><button class="yt-playbtn" aria-label="재생">▶</button></div>`;
  f.querySelector(".yt-thumb").addEventListener("click",()=>embedYT(id));
  let open=$("ytOpen");if(!open){open=document.createElement("a");open.id="ytOpen";open.className="yt-open";open.target="_blank";open.rel="noopener";$("ytFrame").after(open);}
  open.href=`https://www.youtube.com/watch?v=${id}`;open.textContent="↗ 유튜브에서 열기";open.style.display="block";}
function embedYT(id){$("ytFrame").innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=0&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;}
function playYT(id){showThumb(id);store.set("ytLast",id);}
$("ytPlay").addEventListener("click",()=>{const id=parseYT($("ytInput").value);if(id){playYT(id);$("ytInput").value="";}else{$("ytInput").value="";$("ytInput").placeholder="링크를 다시 확인해 주세요";}});
$("ytInput").addEventListener("keydown",e=>{if(e.key==="Enter")$("ytPlay").click();});
const ytSaved=store.get("ytLast",null);if(ytSaved)playYT(ytSaved);
const yt=$("yt"),launch=$("ytLaunch");yt.style.display="none";launch.style.display="flex";
$("ytCollapse").addEventListener("click",()=>{yt.style.display="none";launch.style.display="flex";});
launch.addEventListener("click",()=>{yt.style.display="block";launch.style.display="none";});
(function(){const bar=$("ytBar");let drag=false,ox=0,oy=0;
  function down(e){if(e.target.closest("button"))return;drag=true;const r=yt.getBoundingClientRect();
    yt.style.left=r.left+"px";yt.style.top=r.top+"px";yt.style.right="auto";yt.style.bottom="auto";
    const p=e.touches?e.touches[0]:e;ox=p.clientX-r.left;oy=p.clientY-r.top;e.preventDefault();}
  function move(e){if(!drag)return;const p=e.touches?e.touches[0]:e;
    let x=Math.max(6,Math.min(p.clientX-ox,innerWidth-yt.offsetWidth-6));let y=Math.max(6,Math.min(p.clientY-oy,innerHeight-yt.offsetHeight-6));
    yt.style.left=x+"px";yt.style.top=y+"px";}
  function up(){drag=false;}
  bar.addEventListener("mousedown",down);addEventListener("mousemove",move);addEventListener("mouseup",up);
  bar.addEventListener("touchstart",down,{passive:false});addEventListener("touchmove",move,{passive:false});addEventListener("touchend",up);
})();

/* ---------- 백업 내보내기/가져오기 ---------- */
const BK_KEYS=["events","attendance","roster","todos","timetable","timetableRoom","stuNo","ytLast","attHidden"];
/* ---------- 저장소 초기화 감지 + IndexedDB 미러 자동복구 ---------- */
(function(){
  const DATA_KEYS=["events","attendance","roster","todos"];
  const hasData=()=>DATA_KEYS.some(k=>{const v=store.get(k,null);return v&&Object.keys(v).length;});
  // IndexedDB 미러 (localStorage와 별도 저장소)
  function idb(cb){
    try{const rq=indexedDB.open("pixelDash",1);
      rq.onupgradeneeded=()=>rq.result.createObjectStore("kv");
      rq.onsuccess=()=>cb(rq.result);rq.onerror=()=>{};}catch(e){}
  }
  function mirrorSave(){
    if(!hasData())return;
    const payload=bkPayload();
    idb(db=>{try{db.transaction("kv","readwrite").objectStore("kv").put(payload,"mirror");}catch(e){}});
  }
  function mirrorLoad(cb){
    idb(db=>{try{const rq=db.transaction("kv","readonly").objectStore("kv").get("mirror");
      rq.onsuccess=()=>cb(rq.result||null);rq.onerror=()=>cb(null);}catch(e){cb(null);}});
  }
  window.__mirrorSave=mirrorSave;
  if(!hasData()){
    // 데이터가 비어 있음: 미러가 있으면 자동 복구
    mirrorLoad(txt=>{
      if(!txt)return;
      try{
        const data=JSON.parse(txt);
        if(data._app!=="pixel-dashboard")return;
        BK_KEYS.forEach(k=>{if(k in data)store.set(k,data[k]);});
        // 배너로 알려주고 새로고침해 화면 반영
        sessionStorage.setItem("autoRestored","1");
        location.reload();
      }catch(e){}
    });
  }
  if(sessionStorage.getItem("autoRestored")){
    sessionStorage.removeItem("autoRestored");
    const b=$("wipeBanner");
    b.querySelector(".wb-msg").innerHTML="<b>저장 데이터가 사라져서 자동으로 복구했어요! ✅</b><br>재발 방지를 위해 Lively 설정에서 브라우저 엔진을 WebView2로 바꿔보세요.";
    b.querySelector("#wbRestore").style.display="none";
    b.classList.add("show");
    setTimeout(()=>b.classList.remove("show"),15000);
  }
  // 주기적으로 미러 갱신 (1분마다 + 시작 시)
  mirrorSave();setInterval(mirrorSave,60000);
})();
$("wbRestore").addEventListener("click",()=>{$("wipeBanner").classList.remove("show");bkOpen("import");});
$("wbClose").addEventListener("click",()=>$("wipeBanner").classList.remove("show"));
function bkPayload(){
  const data={_app:"pixel-dashboard",_ver:1,_saved:new Date().toISOString()};
  BK_KEYS.forEach(k=>{const v=store.get(k,undefined);if(v!==undefined)data[k]=v;});
  return JSON.stringify(data);
}
function bkRestoreText(txt){
  try{
    const data=JSON.parse(txt);
    if(data._app!=="pixel-dashboard")throw 0;
    if(!confirm("백업을 불러오면 현재 데이터를 덮어씁니다. 계속할까요?"))return;
    BK_KEYS.forEach(k=>{if(k in data)store.set(k,data[k]);});
    location.reload();
  }catch(e){alert("올바른 백업 내용이 아니에요. 복사한 백업 전체를 붙여넣었는지 확인해 주세요.");}
}
function bkOpen(mode){ // "export" | "import"
  const ta=$("bkText"),btns=$("bkBtns");
  btns.innerHTML="";
  if(mode==="export"){
    $("bkTitle").textContent="백업 저장";
    $("bkHint").innerHTML="아래 내용이 백업 전체예요.<br><b>[복사하기]</b>를 눌러 메모장·카톡 나에게 보내기 등에 붙여넣어 보관하세요.";
    ta.value=bkPayload();ta.readOnly=true;
    const copy=document.createElement("button");copy.className="pbtn";copy.textContent="복사하기";
    copy.addEventListener("click",()=>{
      ta.focus();ta.select();
      let ok=false;
      try{ok=document.execCommand("copy");}catch(e){}
      if(!ok&&navigator.clipboard)navigator.clipboard.writeText(ta.value).then(()=>{copy.textContent="복사 완료!";});
      else copy.textContent=ok?"복사 완료!":"Ctrl+C를 눌러주세요";
      setTimeout(()=>copy.textContent="복사하기",2000);
    });
    const file=document.createElement("button");file.className="pbtn ghost";file.textContent="파일로 저장";
    file.addEventListener("click",()=>{
      const blob=new Blob([ta.value],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      const d=new Date();a.download=`대시보드백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
      a.click();URL.revokeObjectURL(a.href);
    });
    btns.append(copy,file,mkClose());
    setTimeout(()=>{ta.focus();ta.select();},50);
  }else{
    $("bkTitle").textContent="백업 불러오기";
    $("bkHint").innerHTML="보관해둔 백업 내용을 아래에 <b>붙여넣고 [복원하기]</b>를 누르세요.<br>백업 파일이 있다면 [파일에서 불러오기]도 가능해요.";
    ta.value="";ta.readOnly=false;ta.placeholder="여기에 백업 내용 붙여넣기 (Ctrl+V)";
    const restore=document.createElement("button");restore.className="pbtn";restore.textContent="복원하기";
    restore.addEventListener("click",()=>bkRestoreText(ta.value.trim()));
    const file=document.createElement("button");file.className="pbtn ghost";file.textContent="파일에서 불러오기";
    file.addEventListener("click",()=>$("bkFile").click());
    btns.append(restore,file,mkClose());
    setTimeout(()=>ta.focus(),50);
  }
  function mkClose(){const c=document.createElement("button");c.className="pbtn ghost";c.textContent="닫기";
    c.addEventListener("click",()=>$("bkModal").classList.remove("show"));return c;}
  $("bkModal").classList.add("show");
}
$("bkModal").addEventListener("click",e=>{if(e.target===$("bkModal"))$("bkModal").classList.remove("show");});
$("bkExport").addEventListener("click",()=>bkOpen("export"));
$("bkImport").addEventListener("click",()=>bkOpen("import"));
$("bkFile").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const data=JSON.parse(r.result);
    if(data._app!=="pixel-dashboard")throw new Error("형식이 다른 파일");
    if(!confirm("백업을 불러오면 현재 데이터를 덮어씁니다. 계속할까요?"))return;
    BK_KEYS.forEach(k=>{if(k in data)store.set(k,data[k]);});
    location.reload();
  }catch(err){alert("불러오기 실패: 올바른 백업 파일이 아니에요.");}};
  r.readAsText(file);e.target.value="";
});

/* ---------- 월간 출결 통계 ---------- */
let statY,statM,statCat=-1; // -1=전체, 0~3=병/미인정/인정/기타
let statLast={per:{},reasons:[]};
function openStats(){const n=new Date();statY=n.getFullYear();statM=n.getMonth();statCat=-1;renderStats();$("statModal").classList.add("show");}
function renderStats(){
  $("statMonth").textContent=`${statY}년 ${statM+1}월`;
  // 분류 필터 버튼
  const filt=$("statFilter");filt.innerHTML="";
  ["전체",...CATLABEL].forEach((lab,i)=>{
    const b=document.createElement("button");b.className="cp"+((i-1)===statCat?" sel":"");b.textContent=lab;
    b.addEventListener("click",()=>{statCat=i-1;renderStats();});filt.appendChild(b);
  });
  const prefix=`${statY}-${String(statM+1).padStart(2,"0")}-`;
  const per={};      // {학생: [결,지,조,과] 일수}
  const reasons=[];  // {d,stu,st,c,r}
  Object.entries(attendance).forEach(([date,day])=>{
    if(!date.startsWith(prefix))return;
    const dd=Number(date.slice(-2));
    const seen={};
    Object.entries(day).forEach(([k,o])=>{
      const st=o.s;if(!(st>=1&&st<=4))return;
      const cat=(o.c!=null?o.c:0);
      if(statCat>=0&&cat!==statCat)return;   // 분류 필터
      const [stu,p]=k.split("_");
      (seen[stu]=seen[stu]||new Set()).add(st);
      reasons.push({d:dd,stu,p:Number(p),st,c:cat,r:o.r||""});
    });
    Object.entries(seen).forEach(([stu,set])=>{
      per[stu]=per[stu]||[0,0,0,0];
      set.forEach(st=>per[stu][st-1]++);
    });
  });
  const body=$("statBody");body.innerHTML="";
  const rows=Object.entries(per).sort((a,b)=>Number(a[0])-Number(b[0]));
  if(!rows.length){body.innerHTML='<div class="stat-empty">해당 기록이 없어요 🎉</div>';}
  else{
    const head=document.createElement("div");head.className="stat-row head";
    head.innerHTML='<span>학생</span><span class="num">결석</span><span class="num">지각</span><span class="num">조퇴</span><span class="num">결과</span>';
    body.appendChild(head);
    rows.forEach(([stu,c])=>{
      const r=document.createElement("div");r.className="stat-row";
      const who=roster[stu]?`${stu}번 ${escapeHtml(roster[stu])}`:`${stu}번`;
      r.innerHTML=`<span>${who}</span>`+c.map(n=>`<span class="num${n?"":" z"}">${n||"·"}</span>`).join("");
      body.appendChild(r);
    });
  }
  // 사유 기록 목록 (날짜순)
  statLast={per,reasons};
  const rl=$("statReasons");rl.innerHTML="";
  reasons.sort((a,b)=>a.d-b.d||Number(a.stu)-Number(b.stu)||a.p-b.p);
  if(!reasons.length){rl.innerHTML='<div class="stat-empty">기록 없음</div>';return;}
  reasons.forEach(it=>{
    const who=roster[it.stu]?`${it.stu}번 ${escapeHtml(roster[it.stu])}`:`${it.stu}번`;
    const li=document.createElement("div");li.className="sr";
    li.innerHTML=`<span class="d">${it.d}일</span><span class="tag s${it.st}">${STLABEL[it.st]}</span><span class="cat">${CATLABEL[it.c]}</span><b>${who}</b> ${it.p+1}교시${it.r?" · "+escapeHtml(it.r):""}`;
    rl.appendChild(li);
  });
}
function csvCell(v){v=String(v??"");return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
$("statExport").addEventListener("click",()=>{
  const title=`${statY}년 ${statM+1}월 출결 통계`+(statCat>=0?` (${CATLABEL[statCat]})`:" (전체)");
  const lines=[[title],[],["학생","결석(일)","지각(일)","조퇴(일)","결과(일)"]];
  Object.entries(statLast.per).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([stu,c])=>{
    const who=roster[stu]?`${stu}번 ${roster[stu]}`:`${stu}번`;
    lines.push([who,c[0],c[1],c[2],c[3]]);
  });
  lines.push([],["사유 기록"],["날짜","학생","교시","구분","분류","사유"]);
  [...statLast.reasons].sort((a,b)=>a.d-b.d||Number(a.stu)-Number(b.stu)||a.p-b.p).forEach(it=>{
    const who=roster[it.stu]?`${it.stu}번 ${roster[it.stu]}`:`${it.stu}번`;
    lines.push([`${statM+1}/${it.d}`,who,`${it.p+1}교시`,STLABEL[it.st],CATLABEL[it.c],it.r||""]);
  });
  const csv="\uFEFF"+lines.map(row=>row.map(csvCell).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`출결통계_${statY}-${String(statM+1).padStart(2,"0")}`+(statCat>=0?`_${CATLABEL[statCat]}`:"")+".csv";
  a.click();URL.revokeObjectURL(a.href);
});
$("attStats").addEventListener("click",openStats);
$("statPrev").addEventListener("click",()=>{if(--statM<0){statM=11;statY--;}renderStats();});
$("statNext").addEventListener("click",()=>{if(++statM>11){statM=0;statY++;}renderStats();});
$("statClose").addEventListener("click",()=>$("statModal").classList.remove("show"));
$("statModal").addEventListener("click",e=>{if(e.target===$("statModal"))$("statModal").classList.remove("show");});

$("startPress").addEventListener("click",()=>{const el=document.documentElement;
  if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen||(()=>{})).call(el);
  else (document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document);});
</script>
